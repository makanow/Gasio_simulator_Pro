<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio 計算機 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        /* CSSは君のオリジナルを100%継承 */
        :root { 
            --bg: #f8fafc; --sidebar: #ffffff; --text-main: #1e293b; --text-muted: #64748b; 
            --border: #e2e8f0; --accent: #3498db; --accent-hover: #2980b9; 
            --red: #e74c3c; --green: #2ecc71; --dark: #2c3e50;
        }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        .sidebar { width: 380px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2rem 1.5rem; overflow-y: auto; z-index: 10; }
        
        /* ロゴ配色修正 */
        .main-title { font-size: 2.2rem; font-weight: 800; color: var(--dark); margin-bottom: 0px; letter-spacing: -1px; }
        .main-title span.i { color: var(--red); }
        .main-title span.o { color: var(--accent); }
        .sub-title { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; margin-bottom: 24px; border-bottom: 2px solid var(--accent); padding-bottom: 12px; font-weight: 600; }
        
        .control-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-muted); }
        .checkbox-list { background: #f8fafc; border: 1px solid var(--border); border-radius: 6px; padding: 0.75rem; max-height: 140px; overflow-y: auto; }
        .checkbox-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.9rem; font-weight: 500; }
        .checkbox-item input { margin: 0; cursor: pointer; accent-color: var(--accent); }
        .input-matrix { width: 100%; border-collapse: collapse; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
        .input-matrix th { background: #f1f5f9; padding: 0.5rem; text-align: left; font-size: 0.75rem; color: var(--text-muted); }
        .input-matrix td { padding: 0.3rem 0.4rem; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .input-matrix input { width: 100%; padding: 0.4rem; border: 1px solid var(--border); border-radius: 4px; text-align: right; }
        
        .run-btn { background: var(--accent); color: white; border: none; padding: 1rem; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 1rem; }
        .sidebar-bottom { margin-top: auto; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-link-btn { text-align: center; text-decoration: none; background: #f8fafc; color: var(--dark); border: 1px solid var(--border); padding: 0.8rem; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }

        .main { flex: 1; padding: 2rem 3rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        details.master-details { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        details.master-details summary { padding: 1rem 1.5rem; font-weight: 700; cursor: pointer; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
        .master-content { padding: 1.5rem; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; }
        .plan-card { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .plan-card-header { background: var(--dark); color: #fff; padding: 0.75rem 1rem; font-weight: bold; }
        .plan-card-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .plan-card-table th, .plan-card-table td { padding: 0.5rem 1rem; border-bottom: 1px solid var(--border); text-align: left; }
        .plan-card-table td.num { text-align: right; font-family: monospace; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
        .metric-card { background: #fff; padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border); border-left: 5px solid var(--accent); }
        .m-value { font-size: 2rem; font-weight: 800; color: var(--dark); }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; height: 350px; }
        .canvas-container { flex: 1; position: relative; min-height: 0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="main-title">Gas<span class="i">i</span><span class="o">o</span> 計算機 Pro</div>
    <div class="sub-title">Rate Simulation System</div>
    <div class="control-group">
        <label>対象の料金表 (複数選択可)</label>
        <div class="checkbox-list" id="plan_checkboxes"></div>
    </div>
    <div class="control-group">
        <label>新料金マトリックス</label>
        <table class="input-matrix" id="tier_table">
            <tbody id="tier_body">
                <tr><td>基</td><td>-</td><td><input type="number" id="n_base" value="2000"></td></tr>
                <tr><td>1</td><td><input type="number" class="input-limit" value="5"></td><td><input type="number" class="input-price" value="650"></td></tr>
                <tr><td>2</td><td><input type="number" class="input-limit" value="20"></td><td><input type="number" class="input-price" value="600"></td></tr>
                <tr><td>3</td><td>それ以上</td><td><input type="number" class="input-price" value="550"></td></tr>
            </tbody>
        </table>
    </div>
    <button class="run-btn" id="run_btn">シミュレーション実行</button>
    <div id="status" style="font-size: 0.8rem; color: var(--text-muted); text-align: center; margin-top: 1rem;">Ready</div>
    <div class="sidebar-bottom">
        <a href="data_manager.html" class="nav-link-btn">⚙️ データ管理・設定</a>
        <button onclick="logOut()" class="nav-link-btn" style="color: var(--red); border-color: #f5b7b1;">🚪 ログアウト</button>
    </div>
</div>

<div class="main">
    <details class="master-details">
        <summary onclick="loadMasterData()">現行料金表マスターを確認</summary>
        <div id="master_table_container" class="master-content"></div>
    </details>
    <div class="metrics-grid">
        <div class="metric-card"><div class="m-label">現行 総収益 (推定)</div><div id="v_cur" class="m-value">¥0</div></div>
        <div class="metric-card" style="border-left-color: #e67e22;"><div class="m-label">新料金 総収益</div><div id="v_new" class="m-value">¥0</div></div>
        <div class="metric-card" id="card_diff"><div class="m-label">収益インパクト (差額)</div><div id="v_diff" class="m-value">¥0</div><div id="v_delta" style="font-weight:bold;">-</div></div>
    </div>
    <div class="charts-grid">
        <div class="chart-box"><h3>現行区画別 調定数比率</h3><div class="canvas-container"><canvas id="distChart"></canvas></div></div>
        <div class="chart-box"><h3>区画別 収益比較</h3><div class="canvas-container"><canvas id="revChart"></canvas></div></div>
    </div>
    <div class="trend-grid" style="height:350px; margin-top:1.5rem;">
        <div class="chart-box" style="height:100%;"><h3>過去1年間の使用量推移</h3><div class="canvas-container"><canvas id="trendChart"></canvas></div></div>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);
    const client = supabase.createClient("https://etbsbcbzzxkbkasixmdb.supabase.co", "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI");
    let distChartObj = null, revChartObj = null, trendChartObj = null, currentUser = null, isDemoMode = false;
    const PALETTE = ['#88a0b9', '#82e0aa', '#f5b7b1', '#f9e79f', '#d7bde2'];

    client.auth.getSession().then(({ data: { session } }) => {
        if (!session) window.location.href = 'login.html';
        currentUser = session.user;
        init();
    });

    async function logOut() { await client.auth.signOut(); window.location.href = 'login.html'; }

    async function init() {
        const { data } = await client.from('price_masters').select('plan_id, plan_name').eq('user_id', currentUser.id).order('plan_id');
        const container = document.getElementById('plan_checkboxes');
        if (!data || data.length === 0) {
            isDemoMode = true;
            container.innerHTML = '<label class="checkbox-item"><input type="checkbox" checked disabled> (Demo) 101: 一般料金</label>';
        } else {
            isDemoMode = false;
            const unique = [...new Map(data.map(p => [p.plan_id, p])).values()];
            unique.forEach((p, idx) => {
                container.innerHTML += `<label class="checkbox-item"><input type="checkbox" class="plan-check" value="${p.plan_id}" ${idx==0?'checked':''} onchange="loadMasterData();loadTrendData();"> ${p.plan_id}: ${p.plan_name}</label>`;
            });
        }
        loadMasterData(); loadTrendData();
    }

    async function loadMasterData() {
        const selectedIds = Array.from(document.querySelectorAll('.plan-check:checked')).map(cb => parseInt(cb.value));
        const container = document.getElementById('master_table_container');
        let data;
        if (isDemoMode) { data = [{ plan_id: 101, plan_name: "一般料金", tier_name: "一般 A", min_usage: 0, max_usage: 5.0, base_fee: 2000, unit_price: 650 }]; }
        else { const res = await client.from('price_masters').select('*').in('plan_id', selectedIds).eq('user_id', currentUser.id).order('plan_id').order('min_usage'); data = res.data; }
        if (!data) return;

        const planGroups = {};
        data.forEach(row => { if (!planGroups[row.plan_id]) planGroups[row.plan_id] = { name: row.plan_name, tiers: [] }; planGroups[row.plan_id].tiers.push(row); });

        let html = '';
        for (const [pId, pData] of Object.entries(planGroups)) {
            html += `<div class="plan-card"><div class="plan-card-header">${pId}: ${pData.name}</div><table class="plan-card-table"><thead><tr><th>区画名</th><th>適用範囲</th><th>基本料金</th><th>単価</th></tr></thead><tbody>`;
            pData.tiers.forEach((row, idx) => {
                const maxU = row.max_usage >= 99999 ? '∞' : row.max_usage.toFixed(1);
                const base = idx === 0 ? `¥${row.base_fee.toLocaleString()}` : '-';
                html += `<tr><td>${row.tier_name || '-'}</td><td>${row.min_usage.toFixed(1)}~${maxU}</td><td class="num">${base}</td><td class="num">¥${row.unit_price}</td></tr>`;
            });
            html += `</tbody></table></div>`;
        }
        container.innerHTML = html;
    }

    async function loadTrendData() {
        const selectedIds = Array.from(document.querySelectorAll('.plan-check:checked')).map(cb => cb.value);
        if (selectedIds.length === 0) return;
        const { data } = await client.from('gas_data_v3').select('year_month, tariff_id, usage_amount').in('tariff_id', selectedIds).eq('user_id', currentUser.id).order('year_month');
        if (!data || data.length === 0) return;
        const aggregated = {}; const months = new Set();
        data.forEach(row => { months.add(row.year_month); if(!aggregated[row.year_month]) aggregated[row.year_month] = {}; aggregated[row.year_month][row.tariff_id] = (aggregated[row.year_month][row.tariff_id] || 0) + row.usage_amount; });
        const labels = Array.from(months).sort();
        if (trendChartObj) trendChartObj.destroy();
        trendChartObj = new Chart(document.getElementById('trendChart'), { type: 'line', data: { labels, datasets: selectedIds.map((id, i) => ({ label: `Plan ${id}`, data: labels.map(m => aggregated[m][id] || 0), borderColor: PALETTE[i%5], fill: false })) }, options: { responsive: true, maintainAspectRatio: false } });
    }

    async function runSim() {
        const btn = document.getElementById('run_btn'); btn.innerText = "計算中...";
        const selectedIds = Array.from(document.querySelectorAll('.plan-check:checked')).map(cb => parseInt(cb.value));
        const payload = { t_plan_ids: selectedIds, n_base: parseFloat(document.getElementById('n_base').value), n_limits: Array.from(document.querySelectorAll('.input-limit')).map(inp => parseFloat(inp.value)), n_prices: Array.from(document.querySelectorAll('.input-price')).map(inp => parseFloat(inp.value)) };
        const { data, error } = await client.rpc('run_simulation_rpc', payload);
        if (error) { alert(error.message); btn.innerText = "シミュレーション実行"; return; }

        let curTotal = 0, newTotal = 0, cTierMap = {}, nTierMap = {};
        data.forEach(d => {
            curTotal += d.current_revenue; newTotal += d.new_revenue;
            cTierMap[d.c_tier_name] = (cTierMap[d.c_tier_name] || 0) + d.customer_count;
            if(!nTierMap[d.n_tier_name]) nTierMap[d.n_tier_name] = { cur: 0, new: 0 };
            nTierMap[d.n_tier_name].cur += d.current_revenue; nTierMap[d.n_tier_name].new += d.new_revenue;
        });

        document.getElementById('v_cur').innerText = "¥" + Math.round(curTotal).toLocaleString();
        document.getElementById('v_new').innerText = "¥" + Math.round(newTotal).toLocaleString();
        const diff = newTotal - curTotal; document.getElementById('v_diff').innerText = "¥" + Math.round(diff).toLocaleString();
        const delta = ((newTotal / curTotal) - 1) * 100; document.getElementById('v_delta').innerText = delta.toFixed(2) + "%";

        if (distChartObj) distChartObj.destroy();
        distChartObj = new Chart(document.getElementById('distChart'), { type: 'doughnut', data: { labels: Object.keys(cTierMap), datasets: [{ data: Object.values(cTierMap), backgroundColor: PALETTE }] }, options: { responsive: true, maintainAspectRatio: false } });

        if (revChartObj) revChartObj.destroy();
        revChartObj = new Chart(document.getElementById('revChart'), { type: 'bar', data: { labels: Object.keys(nTierMap), datasets: [{ label: '現行', data: Object.keys(nTierMap).map(k => nTierMap[k].cur), backgroundColor: '#95a5a6' }, { label: '新料金', data: Object.keys(nTierMap).map(k => nTierMap[k].new), backgroundColor: '#e67e22' }] }, options: { responsive: true, maintainAspectRatio: false } });

        btn.innerText = "シミュレーション実行"; document.getElementById('status').innerText = "✓ 完了";
    }
    document.getElementById('run_btn').addEventListener('click', runSim);
</script>
</body>
</html>
