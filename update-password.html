<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio - パスワード再設定</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #e74c3c; --dark: #2c3e50; }
        body { font-family: sans-serif; background: var(--bg); display: flex; height: 100vh; justify-content: center; align-items: center; margin: 0; }
        .card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); width: 400px; text-align: center; }
        .title { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: 2rem; }
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; color: #64748b; }
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; background: #3498db; color: white; }
        #msg { margin-top: 1rem; font-size: 0.85rem; color: #e74c3c; }
    </style>
</head>
<body>
<div class="card">
    <div class="title">新しいパスワードの設定</div>
    <div class="input-group"><label>新しいパスワード</label><input type="password" id="new_password" placeholder="6文字以上"></div>
    <div id="msg"></div>
    <button onclick="updatePassword()">パスワードを更新する</button>
</div>
<script>
    const client = supabase.createClient("https://etbsbcbzzxkbkasixmdb.supabase.co", "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI");

    async function updatePassword() {
        const newPassword = document.getElementById('new_password').value;
        if (newPassword.length < 6) {
            document.getElementById('msg').innerText = "パスワードは6文字以上で入力してください。";
            return;
        }

        const { error } = await client.auth.updateUser({ password: newPassword });

        if (error) {
            document.getElementById('msg').innerText = error.message;
        } else {
            alert("パスワードを更新しました。新しいパスワードでログインしてください。");
            window.location.href = './login.html';
        }
    }
</script>
</body>
</html>
