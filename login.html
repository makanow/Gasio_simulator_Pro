<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio 計算機Pro - ログイン</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #3498db; --accent-hover: #2980b9; --dark: #2c3e50; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; justify-content: center; align-items: center; }
        
        .login-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .main-title { font-size: 2.5rem; font-weight: 800; color: var(--dark); margin-bottom: 0px; letter-spacing: -1px; }
        .sub-title { font-size: 0.9rem; color: #64748b; margin-top: 5px; margin-bottom: 30px; border-bottom: 2px solid var(--accent); padding-bottom: 15px; font-weight: 600; }
        
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2); }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; border: none; }
        .btn-login { background: var(--accent); color: white; }
        .btn-login:hover { background: var(--accent-hover); }
        .btn-signup { background: #f1f5f9; color: var(--dark); border: 1px solid var(--border); }
        .btn-signup:hover { background: #e2e8f0; }
        
        #msg { margin-top: 15px; font-size: 0.85rem; color: #e74c3c; font-weight: bold; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="main-title"><span style="color:#2c3e50">Gas</span><span style="color:#e74c3c">i</span><span style="color:#3498db">o</span> 計算機Pro</div>
    <div class="sub-title">Cloud Edition - Member Login</div>
    
    <input type="email" id="email" placeholder="メールアドレス" required>
    <input type="password" id="password" placeholder="パスワード (6文字以上)" required>
    
    <div class="btn-group">
        <button class="btn-signup" onclick="signUp()">新規登録</button>
        <button class="btn-login" onclick="logIn()">ログイン</button>
    </div>
    <div id="msg"></div>
</div>

<script>
    const client = supabase.createClient("https://etbsbcbzzxkbkasixmdb.supabase.co", "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI");

    // すでにログインしている場合はindex.htmlへ飛ばす
    client.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'index.html';
    });

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        document.getElementById('msg').style.color = '#3498db';
        document.getElementById('msg').innerText = "登録処理中...";

        const { data, error } = await client.auth.signUp({ email, password });
        if (error) {
            document.getElementById('msg').style.color = '#e74c3c';
            document.getElementById('msg').innerText = error.message;
        } else {
            window.location.href = 'index.html'; // 成功したらシミュレーション画面へ
        }
    }

    async function logIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        document.getElementById('msg').style.color = '#3498db';
        document.getElementById('msg').innerText = "ログイン処理中...";

        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) {
            document.getElementById('msg').style.color = '#e74c3c';
            document.getElementById('msg').innerText = "ログイン失敗: " + error.message;
        } else {
            window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
