<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio 計算機Pro - ログイン</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #3498db; --accent-hover: #2980b9; --dark: #2c3e50; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; justify-content: center; align-items: center; }
        
        .login-card { background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .main-title { font-size: 2.5rem; font-weight: 800; color: var(--dark); margin-bottom: 0px; letter-spacing: -1px; }
        .sub-title { font-size: 0.9rem; color: #64748b; margin-top: 5px; margin-bottom: 2.5rem; }
        
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; color: #64748b; }
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2); }
        
        .btn-stack { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
        button { width: 100%; padding: 1rem; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline { background: white; color: var(--accent); border: 1px solid var(--accent); }
        .btn-outline:hover { background: #f0f7ff; }
        
        #msg { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2rem; font-weight: 500; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="main-title"><span style="color:#2c3e50">Gas</span><span style="color:#e74c3c">i</span><span style="color:#3498db">o</span></div>
    <div class="sub-title">Rate Simulation System Login</div>

    <div class="input-group">
        <label>メールアドレス</label>
        <input type="email" id="email" placeholder="example@gmail.com">
    </div>
    
    <div class="input-group">
        <label>パスワード</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <div id="msg"></div>

    <div class="btn-stack">
        <button class="btn-primary" onclick="logIn()">ログイン</button>
        <button class="btn-outline" onclick="signUp()">新規アカウント登録</button>
    </div>
</div>

<script>
    // Supabase設定（index.htmlと共通）
    const client = supabase.createClient("https://etbsbcbzzxkbkasixmdb.supabase.co", "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI");

    // すでにログインしている場合はindex.htmlへ飛ばす
    client.auth.getSession().then(({ data: { session } }) => {
        if (session) window.location.href = 'index.html';
    });

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');
        
        if (!email || !password) {
            msg.style.color = '#e74c3c';
            msg.innerText = "メールとパスワードを入力してくれ。";
            return;
        }

        msg.style.color = '#3498db';
        msg.innerText = "登録処理中...";

        const { data, error } = await client.auth.signUp({ email, password });
        if (error) {
            msg.style.color = '#e74c3c';
            msg.innerText = error.message;
        } else {
            msg.style.color = '#2ecc71';
            msg.innerText = "確認メールを送信した。メールを確認してくれ。";
        }
    }

    async function logIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');

        if (!email || !password) {
            msg.style.color = '#e74c3c';
            msg.innerText = "入力が足りないぞ。";
            return;
        }

        msg.style.color = '#3498db';
        msg.innerText = "ログイン処理中...";

        const { data, error } = await client.auth.signInWithPassword({ email, password });
        if (error) {
            msg.style.color = '#e74c3c';
            msg.innerText = "失敗: " + error.message;
        } else {
            window.location.href = 'index.html';
        }
    }
</script>
</body>
</html>
