<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio - ログイン</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #3498db; --dark: #2c3e50; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); display: flex; height: 100vh; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: white; padding: 3.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; }
        .main-title { font-size: 2.5rem; font-weight: 800; color: var(--dark); margin-bottom: 0px; letter-spacing: -1px; }
        .sub-title { font-size: 0.9rem; color: #64748b; margin-bottom: 2.5rem; }
        .input-group { text-align: left; margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 0.5rem; color: #64748b; }
        input { width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        button { width: 100%; padding: 1rem; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; border: none; margin-top: 1rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: white; color: var(--accent); border: 1px solid var(--accent); }
        #msg { margin-top: 1rem; color: #e74c3c; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="main-title">Gasio</div>
    <div class="sub-title">Rate Simulation System Login</div>
    <div class="input-group"><label>メールアドレス</label><input type="email" id="email"></div>
    <div class="input-group"><label>パスワード</label><input type="password" id="password"></div>
    <div id="msg"></div>
    <button class="btn-primary" onclick="logIn()">ログイン</button>
    <button class="btn-outline" onclick="signUp()">新規アカウント登録</button>
</div>
<script>
    const client = supabase.createClient("https://etbsbcbzzxkbkasixmdb.supabase.co", "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI");
    async function logIn() {
        const { error } = await client.auth.signInWithPassword({ email: email.value, password: password.value });
        if (error) msg.innerText = error.message;
        else window.location.href = './index.html';
    }
    async function signUp() {
        const { error } = await client.auth.signUp({ email: email.value, password: password.value });
        if (error) msg.innerText = error.message;
        else msg.innerText = "確認メールを確認してください。";
    }
</script>
</body>
</html>
