<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio 計算機Pro - データ管理 (v3対応版)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #3498db; --red: #e74c3c; --dark: #2c3e50; --green: #2ecc71; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .main-title { font-size: 2rem; font-weight: 800; color: var(--dark); margin: 0; letter-spacing: -1px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 900px; padding: 2rem; margin-bottom: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 0.75rem; margin-bottom: 1.5rem; }
        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 2rem; text-align: center; transition: all 0.2s; }
        .upload-area:hover { border-color: var(--accent); background: #f0f9ff; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: #fee2e2; color: var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }
        .status { margin-top: 1rem; font-size: 0.9rem; font-weight: 600; }
        .status.success { color: var(--green); }
        .status.error { color: var(--red); }
        .console { background: #1e293b; color: #38bdf8; padding: 1rem; border-radius: 8px; font-family: monospace; width: 100%; max-width: 900px; height: 150px; overflow-y: auto; font-size: 0.85rem; line-height: 1.4; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="main-title">Gasio <span style="color:var(--accent)">Pro</span> Manager</h1>
    <button class="btn btn-danger" onclick="location.href='index.html'">シミュレーターに戻る</button>
</div>

<div class="card">
    <div class="section-title">1年分請求データ一括インポート (v3)</div>
    <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 1rem;">
        CSV形式: <b>年月, 料金番号, 料金表番号, 使用量</b> (日付形式は自動判別されます)
    </p>
    <div class="upload-area">
        <input type="file" id="billingCsv" accept=".csv" style="display:none" onchange="handleBillingUpload(this)">
        <button class="btn btn-primary" onclick="document.getElementById('billingCsv').click()">CSVファイルを選択</button>
        <div id="billingStatus" class="status"></div>
    </div>
    <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
        <button class="btn btn-danger" onclick="deleteBilling()">全請求データを削除</button>
    </div>
</div>

<div class="console" id="consoleLog">
    [SYSTEM] 待機中... データの読み込み準備完了
</div>

<script>
    // ナガセさんの正しい接続情報をセット済みです！
    const SUPABASE_URL = "https://etbsbcbzzxkbkasixmdb.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI"; 
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    function log(msg) {
        const el = document.getElementById('consoleLog');
        const time = new Date().toLocaleTimeString();
        el.innerHTML += `<div>[${time}] ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    async function checkAuth() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) { location.href = 'login.html'; return; }
        currentUser = user;
        log(`ログイン中: ${user.email}`);
    }

    // 日付形式を YYYYMM に統一する魔法の関数
    function standardizeYearMonth(val) {
        if (!val) return null;
        let s = val.toString().trim().replace(/["']/g, "");

        if (s.includes('/') || s.includes('-')) {
            const date = new Date(s);
            if (!isNaN(date.getTime())) {
                const y = date.getFullYear();
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                return `${y}${m}`;
            }
        }
        if (s.length === 4 && /^\d+$/.test(s)) {
            return "20" + s;
        }
        if (s.length === 6 && /^\d+$/.test(s)) {
            return s;
        }
        return null;
    }

    async function handleBillingUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const statusEl = document.getElementById('billingStatus');
        statusEl.innerText = '解析中...';
        log(`ファイル受信: ${file.name}`);

        const reader = new FileReader();
        reader.onload = async (e) => {
            const codes = new Uint8Array(e.target.result);
            const encoding = Encoding.detect(codes);
            const unicodeString = Encoding.convert(codes, { to: 'UNICODE', from: encoding, type: 'string' });

            Papa.parse(unicodeString, {
                header: false,
                skipEmptyLines: true,
                complete: async (results) => {
                    const rawData = results.data;
                    log(`${rawData.length}件のデータを検出。クレンジング開始...`);
                    
                    const insertData = rawData.map((row, idx) => {
                        const ym = standardizeYearMonth(row[0]);
                        if (!ym) log(`⚠️ 行 ${idx+1}: 年月の解釈に失敗しました (${row[0]})`);
                        
                        return {
                            user_id: currentUser.id,
                            year_month: ym,
                            plan_id: String(row[1] || "").trim(),
                            tariff_id: String(row[2] || "").trim(),
                            usage_amount: parseFloat(row[3]) || 0
                        };
                    }).filter(d => d.year_month && d.plan_id);

                    log(`クレンジング完了。有効データ: ${insertData.length}件`);
                    
                    let hasError = false;
                    for (let i = 0; i < insertData.length; i += 1000) {
                        const chunk = insertData.slice(i, i + 1000);
                        const { error } = await client.from('gas_data_v3').insert(chunk);
                        if (error) { 
                            hasError = true; 
                            log(`❌ エラー: ${error.message}`); 
                            break; 
                        }
                        const progress = Math.min(100, Math.round(((i + chunk.length) / insertData.length) * 100));
                        statusEl.innerText = `送信中... ${progress}% (${(i + chunk.length).toLocaleString()}件)`;
                        log(`送信進捗: ${progress}%...`);
                    }

                    if (!hasError) {
                        statusEl.innerText = '✓ 全データインポート完了';
                        statusEl.className = 'status success';
                        log('✅ インポートに成功しました。二次開発の準備が整いました。');
                    } else {
                        statusEl.innerText = 'エラーが発生しました。コンソールを確認してください。';
                        statusEl.className = 'status error';
                    }
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function deleteBilling() {
        if (!confirm("gas_data_v3 の全請求データを削除しますか？")) return;
        const { error } = await client.from('gas_data_v3').delete().eq('user_id', currentUser.id);
        if (error) log(`❌ 削除失敗: ${error.message}`);
        else {
            log("🗑️ データを全削除しました。");
            document.getElementById('billingStatus').innerText = '削除完了';
        }
    }

    checkAuth();
</script>
</body>
</html>
