<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio 計算機 Pro データ管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #3498db; --red: #e74c3c; --dark: #2c3e50; --green: #2ecc71; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        /* タイトルとロゴのスタイル（青/赤） */
        .main-title { font-size: 2rem; font-weight: 800; color: var(--dark); margin: 0; letter-spacing: -1px; }
        .main-title span.gasio { color: #3498db; }
        .main-title span.pro { color: #e74c3c; }
        
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 900px; padding: 2rem; margin-bottom: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 0.75rem; margin-bottom: 1.5rem; }
        
        /* 折りたたみセクションのスタイル */
        details.template-details { background: #f1f5f9; border-radius: 8px; overflow: hidden; }
        details.template-details summary { padding: 1rem; font-weight: 700; cursor: pointer; color: var(--dark); outline: none; transition: 0.2s; }
        details.template-details summary:hover { background: #e2e8f0; }
        
        /* summary の三角形をCSSで制御 */
        details.template-details summary::-webkit-details-marker { display: none; }
        details.template-details summary::after { content: ' ▼'; }
        details.template-details[open] summary::after { content: ' ▲'; }

        .template-content { padding: 1.5rem; border-top: 1px solid var(--border); font-size: 0.85rem; line-height: 1.6; }

        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 2rem; text-align: center; transition: all 0.2s; margin-bottom: 1.5rem; }
        .upload-area:hover { border-color: var(--accent); background: #f0f9ff; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #2c3e50; color: white; margin-top: 1rem; }
        .btn-danger { background: #fee2e2; color: var(--red); }
        .btn-danger:hover { background: var(--red); color: white; }
        .status { margin-top: 1rem; font-size: 0.9rem; font-weight: 600; }
        .status.success { color: var(--green); }
        .status.error { color: var(--red); }
        .console { background: #1e293b; color: #38bdf8; padding: 1rem; border-radius: 8px; font-family: monospace; width: 100%; max-width: 900px; height: 150px; overflow-y: auto; font-size: 0.85rem; line-height: 1.4; margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="main-title"><span class="gasio">Gasio</span> <span class="pro">Pro</span> 計算機 データ管理</h1>
    <button class="btn btn-danger" onclick="location.href='index.html'">シミュレーターに戻る</button>
</div>

<div class="card">
    <details class="template-details">
        <summary>CSVアップロード用テンプレートと仕様を確認</summary>
        <div class="template-content">
            1行目のヘッダー文字列は自由です（システムが自動的に判別・スキップします）。
            <br><br>
            <b>1. 料金表マスター</b><br>
            並び順: 料金番号, 料金名, 下限(m³), 上限(m³), 基本料金(円), 従量単価(円)
            <br><br>
            <b>2. 請求データ (v3)</b><br>
            並び順: 年月, 料金番号, 料金表番号, 使用量
            
            <div style="margin-top: 1.5rem; display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="downloadTemplate('master')">料金表マスタ テンプレートDL</button>
                <button class="btn btn-secondary" onclick="downloadTemplate('billing')">請求データ テンプレートDL</button>
            </div>
        </div>
    </details>
</div>

<div class="card">
    <div class="section-title">料金表マスター インポート</div>
    <div class="upload-area">
        <input type="file" id="file_master" accept=".csv" style="display:none" onclick="this.value=null" onchange="uploadMaster()">
        <button class="btn btn-primary" onclick="document.getElementById('file_master').click()">マスターCSVを選択</button>
        <div id="status_master" class="status"></div>
    </div>
    <button class="btn btn-danger" onclick="deleteMaster()">マスターデータを全削除</button>
</div>

<div class="card">
    <div class="section-title">1年分請求データ一括インポート (v3)</div>
    <div class="upload-area">
        <input type="file" id="billingCsv" accept=".csv" style="display:none" onclick="this.value=null" onchange="handleBillingUpload(this)">
        <button class="btn btn-primary" onclick="document.getElementById('billingCsv').click()">請求データCSVを選択</button>
        <div id="billingStatus" class="status"></div>
    </div>
    <button class="btn btn-danger" onclick="deleteBillingV3()">全請求データを削除</button>
</div>

<div class="console" id="consoleLog">
    [SYSTEM] 待機中... データの読み込み準備完了
</div>

<script>
    const SUPABASE_URL = "https://etbsbcbzzxkbkasixmdb.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI"; 
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    function log(msg) {
        const el = document.getElementById('consoleLog');
        const time = new Date().toLocaleTimeString();
        el.innerHTML += `<div>[${time}] ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    function cleanNum(val) {
        if (val === undefined || val === null) return 0;
        const s = val.toString().replace(/,/g, '').trim();
        const n = parseFloat(s);
        return isNaN(n) ? 0 : n;
    }

    function standardizeYearMonth(val) {
        if (!val) return null;
        let s = val.toString().trim().replace(/["']/g, "");
        if (s.includes('/') || s.includes('-')) {
            const date = new Date(s);
            if (!isNaN(date.getTime())) {
                const y = date.getFullYear();
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                return `${y}${m}`;
            }
        }
        if (s.length === 4 && /^\d+$/.test(s)) return "20" + s;
        if (s.length === 6 && /^\d+$/.test(s)) return s;
        return null;
    }

    function updateCounts() { log("データ件数を更新しました。"); }
    function loadEditableMaster() { log("マスターデータをリロードしました。"); }

    async function checkAuth() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) { location.href = 'login.html'; return; }
        currentUser = user;
        log(`ログイン中: ${user.email}`);
    }

    function downloadTemplate(type) {
        let csvContent = "";
        let fileName = "";
        if (type === 'master') {
            const header = "料金番号,料金名,下限(m3),上限(m3),基本料金(円),従量単価(円)\n";
            const plan1 = "1,一般料金,0,5.0,2000,650\n1,一般料金,5.1,20.0,2000,600\n1,一般料金,20.1,99999,2000,550\n";
            const plan2 = "2,エコ上手,0,10.0,2500,580\n2,エコ上手,10.1,30.0,2500,530\n2,エコ上手,30.1,99999,2500,480\n";
            const plan3 = "3,小型空調,0,50.0,5000,420\n3,小型空調,50.1,100.0,5000,380\n3,小型空調,100.1,99999,5000,350";
            csvContent = header + plan1 + plan2 + plan3;
            fileName = "template_master_sample.csv";
        } else {
            const header = "年月,料金番号,料金表番号,使用量\n";
            const data = "202403,1,1,12.5\n202403,2,2,45.8\n202403,3,3,120.0";
            csvContent = header + data;
            fileName = "template_billing_sample.csv";
        }
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        log(`雛形生成: ${fileName}`);
    }

    async function uploadMaster() {
        const file = document.getElementById('file_master').files[0];
        const statusEl = document.getElementById('status_master');
        if (!file) return;
        statusEl.innerText = '解析中...'; statusEl.className = 'status loading';
        log(`受信: ${file.name}`);

        const reader = new FileReader();
        reader.onload = function(e) {
            const buffer = new Uint8Array(e.target.result);
            const unicodeString = Encoding.convert(buffer, { to: 'UNICODE', type: 'string' });
            Papa.parse(unicodeString, {
                header: false, skipEmptyLines: true,
                complete: async function(results) {
                    let rawData = results.data;
                    if (rawData.length > 0 && isNaN(parseInt(rawData[0][0]))) {
                        rawData.shift(); log("ヘッダーをスキップ");
                    }
                    const insertData = rawData.map(row => ({
                        user_id: currentUser.id, 
                        plan_id: parseInt(cleanNum(row[0])), 
                        plan_name: String(row[1] || "").trim(), 
                        min_usage: cleanNum(row[2]), 
                        max_usage: cleanNum(row[3]), 
                        base_fee: cleanNum(row[4]), 
                        unit_price: cleanNum(row[5])
                    })).filter(d => !isNaN(d.plan_id));

                    const { error } = await client.from('price_masters').insert(insertData);
                    if (error) {
                        statusEl.innerText = 'エラー: ' + error.message; statusEl.className = 'status error';
                    } else { 
                        statusEl.innerText = '✓ 完了'; statusEl.className = 'status success';
                        updateCounts(); loadEditableMaster(); 
                    }
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function handleBillingUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const statusEl = document.getElementById('billingStatus');
        statusEl.innerText = '解析中...';
        log(`受信: ${file.name}`);

        const reader = new FileReader();
        reader.onload = async (e) => {
            const codes = new Uint8Array(e.target.result);
            const encoding = Encoding.detect(codes);
            const unicodeString = Encoding.convert(codes, { to: 'UNICODE', from: encoding, type: 'string' });
            Papa.parse(unicodeString, {
                header: false, skipEmptyLines: true,
                complete: async (results) => {
                    let rawData = results.data;
                    if (rawData.length > 0 && isNaN(parseInt(rawData[0][0])) && !standardizeYearMonth(rawData[0][0])) {
                        rawData.shift(); log("ヘッダーをスキップ");
                    }
                    const insertData = rawData.map(row => ({
                        user_id: currentUser.id,
                        year_month: standardizeYearMonth(row[0]),
                        plan_id: String(row[1] || "").trim(),
                        tariff_id: String(row[2] || "").trim(),
                        usage_amount: parseFloat(row[3]) || 0
                    })).filter(d => d.year_month && d.plan_id);

                    let hasError = false;
                    for (let i = 0; i < insertData.length; i += 1000) {
                        const chunk = insertData.slice(i, i + 1000);
                        const { error } = await client.from('gas_data_v3').insert(chunk);
                        if (error) { hasError = true; log(`❌ エラー: ${error.message}`); break; }
                        statusEl.innerText = `送信中 ${Math.round((i/insertData.length)*100)}%`;
                    }
                    if (!hasError) { statusEl.innerText = '✓ 完了'; statusEl.className = 'status success'; }
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function deleteMaster() {
        if (!confirm("全削除しますか？")) return;
        const { error } = await client.from('price_masters').delete().eq('user_id', currentUser.id);
        if (!error) { log("🗑️ マスター削除完了"); updateCounts(); loadEditableMaster(); }
    }

    async function deleteBillingV3() {
        if (!confirm("全削除しますか？")) return;
        const { error } = await client.from('gas_data_v3').delete().eq('user_id', currentUser.id);
        if (!error) { log("🗑️ 請求データ削除完了"); }
    }

    checkAuth();
</script>
</body>
</html>
