<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Gasio 計算機 Pro データ管理</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/encoding-japanese/2.0.0/encoding.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --text-main: #1e293b; --border: #e2e8f0; --accent: #3498db; --red: #e74c3c; --dark: #2c3e50; --green: #2ecc71; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .main-title { font-size: 2rem; font-weight: 800; color: var(--dark); margin: 0; letter-spacing: -1px; }
        .main-title .i { color: var(--red); }
        .main-title .o { color: var(--accent); }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 900px; padding: 2rem; margin-bottom: 2rem; }
        .section-title { font-size: 1.25rem; font-weight: 700; border-left: 4px solid var(--accent); padding-left: 0.75rem; margin-bottom: 1.5rem; }
        details.template-details { background: #f1f5f9; border-radius: 8px; overflow: hidden; }
        details.template-details summary { padding: 1rem; font-weight: 700; cursor: pointer; outline: none; }
        details.template-details summary::after { content: ' ▼'; }
        details.template-details[open] summary::after { content: ' ▲'; }
        .template-content { padding: 1.5rem; border-top: 1px solid var(--border); font-size: 0.85rem; line-height: 1.6; }
        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 2rem; text-align: center; margin-bottom: 1.5rem; }
        .btn { padding: 0.6rem 1.2rem; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #2c3e50; color: white; margin-top: 1rem; }
        .btn-danger { background: #fee2e2; color: var(--red); }
        .status { margin-top: 1rem; font-size: 0.9rem; font-weight: 600; }
        .status.success { color: var(--green); }
        .console { background: #1e293b; color: #38bdf8; padding: 1rem; border-radius: 8px; font-family: monospace; width: 100%; max-width: 900px; height: 120px; overflow-y: auto; font-size: 0.85rem; margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="header">
    <h1 class="main-title">Gas<span class="i">i</span><span class="o">o</span> 計算機 Pro データ管理</h1>
    <button class="btn btn-danger" onclick="location.href='index.html'">シミュレーターに戻る</button>
</div>

<div class="card">
    <details class="template-details">
        <summary>CSVアップロード用テンプレートと仕様を確認</summary>
        <div class="template-content">
            <b>1. 料金表マスター (7列必須)</b><br>
            料金番号, 料金名, <b>区画名</b>, 下限, 上限, 基本料金, 従量単価
            <div style="margin-top: 1rem; display: flex; gap: 10px;">
                <button class="btn btn-secondary" onclick="downloadTemplate('master')">料金表マスタ 雛形DL</button>
                <button class="btn btn-secondary" onclick="downloadTemplate('billing')">請求データ(v3) 雛形DL</button>
            </div>
        </div>
    </details>
</div>

<div class="card">
    <div class="section-title">料金表マスター インポート</div>
    <div class="upload-area">
        <input type="file" id="file_master" accept=".csv" style="display:none" onclick="this.value=null" onchange="uploadMaster()">
        <button class="btn btn-primary" onclick="document.getElementById('file_master').click()">マスターCSVを選択</button>
        <div id="status_master" class="status"></div>
    </div>
    <button class="btn btn-danger" onclick="deleteMaster()">マスターデータを全削除</button>
</div>

<div class="card">
    <div class="section-title">1年分請求データ一括インポート (v3)</div>
    <div class="upload-area">
        <input type="file" id="billingCsv" accept=".csv" style="display:none" onclick="this.value=null" onchange="handleBillingUpload(this)">
        <button class="btn btn-primary" onclick="document.getElementById('billingCsv').click()">請求データCSVを選択</button>
        <div id="billingStatus" class="status"></div>
    </div>
    <button class="btn btn-danger" onclick="deleteBillingV3()">全請求データを削除</button>
</div>

<div class="console" id="consoleLog">[SYSTEM] 準備完了</div>

<script>
    const client = supabase.createClient("https://etbsbcbzzxkbkasixmdb.supabase.co", "sb_publishable_nXYCdtEvi2W0mc0Euj3itQ_P41HWKhI");
    let currentUser = null;

    function log(msg) {
        const el = document.getElementById('consoleLog');
        el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
    }

    async function checkAuth() {
        const { data: { user } } = await client.auth.getUser();
        if (!user) { location.href = 'login.html'; return; }
        currentUser = user;
    }

    function downloadTemplate(type) {
        let csv = "";
        if (type === 'master') {
            csv = "料金番号,料金名,区画名,下限(m3),上限(m3),基本料金(円),従量単価(円)\n101,一般料金,一般 A,0,8.0,1171,212.55\n101,一般料金,一般 B,8.1,30.0,1171,195.22\n101,一般料金,一般 C,30.1,99999,1171,180.50";
        } else {
            csv = "年月,料金番号,料金表番号,使用量\n202403,101,101,12.5";
        }
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `template_${type}.csv`;
        a.click();
    }

    async function uploadMaster() {
        const file = document.getElementById('file_master').files[0];
        if (!file) return;
        log(`${file.name} を解析中...`);
        const reader = new FileReader();
        reader.onload = function(e) {
            const text = Encoding.convert(new Uint8Array(e.target.result), { to: 'UNICODE', type: 'string' });
            Papa.parse(text, {
                header: false, skipEmptyLines: true,
                complete: async function(results) {
                    let data = results.data;
                    if (isNaN(parseInt(data[0][0]))) data.shift();
                    const insertData = data.map(row => ({
                        user_id: currentUser.id,
                        plan_id: parseInt(row[0]),
                        plan_name: String(row[1] || "").trim(),
                        tier_name: String(row[2] || "").trim(), // ★3列目を区画名として取得
                        min_usage: parseFloat(row[3]) || 0,
                        max_usage: parseFloat(row[4]) || 0,
                        base_fee: parseFloat(row[5]) || 0,
                        unit_price: parseFloat(row[6]) || 0
                    }));
                    const { error } = await client.from('price_masters').insert(insertData);
                    document.getElementById('status_master').innerText = error ? 'エラー: ' + error.message : '✓ 完了';
                    log(error ? `❌ ${error.message}` : "✅ マスター登録成功");
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function handleBillingUpload(input) {
        const file = input.files[0]; if (!file) return;
        log(`請求データ受信: ${file.name}`);
        const reader = new FileReader();
        reader.onload = async (e) => {
            const text = Encoding.convert(new Uint8Array(e.target.result), { to: 'UNICODE', type: 'string' });
            Papa.parse(text, {
                header: false, skipEmptyLines: true,
                complete: async (results) => {
                    let data = results.data;
                    if (isNaN(parseInt(data[0][0]))) data.shift();
                    const insertData = data.map(row => ({
                        user_id: currentUser.id,
                        year_month: String(row[0]).trim(),
                        plan_id: String(row[1]).trim(),
                        tariff_id: String(row[2]).trim(),
                        usage_amount: parseFloat(row[3]) || 0
                    }));
                    const { error } = await client.from('gas_data_v3').insert(insertData);
                    document.getElementById('billingStatus').innerText = error ? 'エラー' : '✓ 完了';
                    log(error ? `❌ ${error.message}` : "✅ 請求データ登録成功");
                }
            });
        };
        reader.readAsArrayBuffer(file);
    }

    async function deleteMaster() { if (confirm("全削除？")) await client.from('price_masters').delete().eq('user_id', currentUser.id); log("🗑️ 削除完了"); }
    async function deleteBillingV3() { if (confirm("全削除？")) await client.from('gas_data_v3').delete().eq('user_id', currentUser.id); log("🗑️ 削除完了"); }
    checkAuth();
</script>
</body>
</html>
